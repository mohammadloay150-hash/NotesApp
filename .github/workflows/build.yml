name: Build Android App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708

      - name: Create Gradle wrapper if missing
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.11.1 2>/dev/null || true
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew 2>/dev/null || true

      - name: Build APK
        run: |
          if [ -f gradlew ]; then
            ./gradlew assembleRelease --stacktrace 2>&1
          else
            # Download Gradle and build manually
            curl -sL "https://services.gradle.org/distributions/gradle-8.11.1-bin.zip" -o gradle.zip
            unzip -q gradle.zip
            GRADLE_HOME=$(pwd)/gradle-8.11.1
            export ANDROID_HOME=$ANDROID_SDK_ROOT
            $GRADLE_HOME/bin/gradle assembleRelease --stacktrace 2>&1
          fi

      - name: Sign APK
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "No APK found"
            exit 1
          fi
          echo "APK found: $APK"

          # Generate keystore
          keytool -genkey -v -keystore release.keystore \
            -alias key0 -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass notesapp -keypass notesapp \
            -dname "CN=Developer, OU=Dev, O=NotesApp, L=City, ST=State, C=SA"

          # Sign
          $ANDROID_SDK_ROOT/build-tools/35.0.0/apksigner sign \
            --ks release.keystore \
            --ks-key-alias key0 \
            --ks-pass pass:notesapp \
            --key-pass pass:notesapp \
            --in "$APK" --out signed.apk 2>/dev/null || \
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
            --ks release.keystore \
            --ks-key-alias key0 \
            --ks-pass pass:notesapp \
            --key-pass pass:notesapp \
            --in "$APK" --out signed.apk

          cp signed.apk Notes_1.0.apk

      - name: Verify APK
        run: |
          if [ -f Notes_1.0.apk ]; then
            SIZE=$(stat -c%s Notes_1.0.apk)
            echo "APK size: $SIZE bytes"
            [ "$SIZE" -gt 500000 ] || { echo "APK too small"; exit 1; }
          else
            echo "No APK file"
            exit 1
          fi

      - name: Send to Telegram
        run: |
          if [ -f Notes_1.0.apk ]; then
            R=$(curl -s -X POST "https://api.telegram.org/bot8975962660:AAHE0uFK9dzDSy7k8UovuwIyLcVzqXhke1M/sendDocument" \
              -F chat_id=1455347628 \
              -F document=@Notes_1.0.apk \
              -F caption="ملاحظاتي 1.0 - جاهز للتثبيت")
            echo "$R" | grep '"ok":true' && echo "APK sent successfully" || echo "Send failed: $R"
          fi
